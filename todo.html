<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-back">
        <a href="index.html#projects" class="back-link">&larr; Back to Portfolio</a>
    </div>

    <main class="app-container">
        <div class="todo-wrapper">
            <header class="app-header">
                <h1>Task Master</h1>
                <p>Stay organized, stay focused.</p>
            </header>

            <form id="todo-form" class="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" required autocomplete="off">
                <button type="submit" class="add-btn">Add Task</button>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todo-list" class="todo-list">
                <!-- Tasks will be dynamically injected here -->
            </ul>

            <div class="todo-stats">
                <span id="items-left">0 items left</span>
                <button id="clear-completed" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </main>

    <script src="todo.js"></script>
</body>
</html>
