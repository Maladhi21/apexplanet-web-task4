<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing</title>
    <link rel="stylesheet" href="css/products.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <a href="index.html#projects" class="back-link">&larr; Back to Portfolio</a>
        <div class="logo">Shop<span class="highlight">Ease</span></div>
    </header>

    <main class="store-container">
        <!-- Sidebar Filters -->
        <aside class="sidebar">
            <h2>Filters</h2>
            
            <div class="filter-group">
                <h3>Category</h3>
                <label><input type="checkbox" class="category-filter" value="electronics"> Electronics</label>
                <label><input type="checkbox" class="category-filter" value="clothing"> Clothing</label>
                <label><input type="checkbox" class="category-filter" value="accessories"> Accessories</label>
            </div>

            <div class="filter-group">
                <h3>Max Price: $<span id="price-value">1000</span></h3>
                <input type="range" id="price-filter" min="0" max="1000" value="1000" class="slider">
            </div>

            <button id="reset-filters" class="btn reset-btn">Reset Filters</button>
        </aside>

        <!-- Product Display Area -->
        <section class="products-area">
            <header class="products-header">
                <p><span id="product-count">0</span> Products Found</p>
                <div class="sort-container">
                    <label for="sort-select">Sort By:</label>
                    <select id="sort-select">
                        <option value="featured">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Top Rated</option>
                    </select>
                </div>
            </header>

            <div id="products-grid" class="products-grid">
                <!-- Products will be dynamically injected here -->
            </div>
            
            <div id="no-products" class="no-products hidden">
                <p>No products match your criteria. Try adjusting the filters.</p>
            </div>
        </section>
    </main>

    <script src="js/products.js"></script>
</body>
</html>
